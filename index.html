<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>拼音大冒险 - Dolly的拼音学习游戏</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    /* 加载动画 */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #ff69b4, #ff85c8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .loading-heart {
      font-size: 80px;
      animation: pulse 1s infinite;
    }
    #loading h1 { font-size: 36px; margin-top: 20px; }
    #loading p { font-size: 16px; opacity: 0.8; margin-top: 10px; }
  </style>
</head>
<body>
  <!-- 加载画面 -->
  <div id="loading">
    <div class="loading-heart">🩷</div>
    <h1>拼音大冒险</h1>
    <p>正在准备冒险...</p>
  </div>

  <!-- 应用容器 -->
  <div id="app"></div>

  <!-- Firebase SDK (CDN compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- 按顺序加载脚本 -->
  <script src="sherpa/sherpa-onnx-asr.js"></script>
  <script src="sherpa/sherpa-onnx-vad.js"></script>
  <script src="js/pinyin-data.js"></script>
  <script src="js/data.js"></script>
  <script src="js/mastery.js?v=2"></script>
  <script src="js/error-book.js"></script>
  <script src="js/hanzi-pinyin.js?v=1"></script>
  <script src="js/speech.js?v=7"></script>
  <script src="js/game.js?v=5"></script>
  <script src="js/firebase-config.js?v=1"></script>
  <script src="js/cloud-sync.js?v=1"></script>
  <script src="js/auth-ui.js?v=1"></script>
  <script src="js/app.js?v=8"></script>
  <script>
    // 页面加载：加载 sherpa-onnx 语音模型，再隐藏加载画面
    window.addEventListener('load', async () => {
      const loadingText = document.querySelector('#loading p');

      // 预加载 sherpa-onnx 语音模型（~94MB WASM+data，首次下载后浏览器缓存）
      if (SpeechModule.isSupported) {
        const ok = await SpeechModule.loadModel((status) => {
          if (!status) return;
          // 解析 Emscripten 下载进度
          const match = status.match(/Downloading data\.\.\. \((\d+)\/(\d+)\)/);
          if (match) {
            const pct = (Number(match[1]) / Number(match[2]) * 100).toFixed(1);
            if (loadingText) loadingText.textContent = `正在下载语音模型... ${pct}%`;
          } else if (status.includes('Running')) {
            if (loadingText) loadingText.textContent = '正在初始化语音引擎...';
          } else {
            if (loadingText) loadingText.textContent = '正在加载语音模型...';
          }
        });
        if (ok) {
          App._sherpaModelReady = true;
          console.log('[Init] sherpa-onnx 模型加载完成');
        } else {
          console.warn('[Init] sherpa-onnx 模型加载失败，语音功能不可用');
        }
      }

      if (loadingText) loadingText.textContent = '准备完毕!';
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        setTimeout(() => {
          document.getElementById('loading').remove();
          // loading 移除后，启动认证/游戏
          AppBoot.start();
        }, 500);
      }, 300);
    });
  </script>
</body>
</html>
